<section class="tasks-shell">
  <div class="tasks-header">
    <div>
      <h1>My Tasks</h1>
      <p class="tasks-subtitle">Stay on top of everything that matters today.</p>
    </div>

    <button class="new-task-button" (click)="showAdd = !showAdd">
      {{ showAdd ? 'Close' : 'New Task' }}
    </button>
  </div>

  <div class="task-tabs">
    <button class="tab-link" [class.active]="selectedTab === 'all'" (click)="setTab('all')">
      All
    </button>
    <button class="tab-link" [class.active]="selectedTab === 'pending'" (click)="setTab('pending')">
      Pending
    </button>
    <button
      class="tab-link"
      [class.active]="selectedTab === 'completed'"
      (click)="setTab('completed')"
    >
      Completed
    </button>
  </div>

  <div *ngIf="showAdd" class="composer-row">
    <input
      type="text"
      class="task-input"
      placeholder="Write your next task..."
      [(ngModel)]="newTaskTitle"
      (keyup.enter)="createTask()"
    />
    <button class="new-task-button submit" [disabled]="isCreating" (click)="createTask()">
      {{ isCreating ? 'Adding...' : 'Add' }}
    </button>
  </div>

  <div class="search-shell">
    <span class="search-icon">o</span>
    <input
      type="search"
      class="task-search"
      placeholder="Search"
      [(ngModel)]="searchText"
    />
    <button class="refresh-link" (click)="fetchTasks()">Refresh</button>
  </div>

  <p *ngIf="taskError" class="task-error">{{ taskError }}</p>
  <p *ngIf="isLoading" class="task-empty">Loading tasks...</p>

  <div *ngIf="!isLoading" class="task-list">
    <article *ngFor="let task of filteredTasks()" class="task-row">
      <div class="task-text">
        <div *ngIf="editingTaskId !== task._id; else editMode" class="task-copy">
          <p [class.done]="task.completed">{{ task.title }}</p>
          <small>{{ task.completed ? 'Completed task' : 'Pending task' }}</small>
        </div>

        <ng-template #editMode>
          <div class="task-edit">
            <input type="text" class="task-input" [(ngModel)]="editText" />
            <div class="edit-actions">
              <button class="refresh-link" (click)="saveEdit(task)">Save</button>
              <button class="refresh-link" (click)="cancelEdit()">Cancel</button>
            </div>
          </div>
        </ng-template>
      </div>

      <div class="task-side">
        <button class="inline-action" (click)="startEdit(task)">Edit</button>
        <button class="inline-action danger" (click)="deleteTask(task)">Delete</button>
        <input
          class="task-checkbox"
          type="checkbox"
          [(ngModel)]="task.completed"
          (change)="toggleTask(task)"
        />
      </div>
    </article>

    <p *ngIf="filteredTasks().length === 0" class="task-empty">No tasks found.</p>
  </div>
</section>
